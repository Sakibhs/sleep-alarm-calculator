name: sleep_alarm_calculator
description: "Sleep Alarm Calculator - Optimize your sleep using 90-minute cycles"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  get: ^4.6.6

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Alarm / intent integration
  android_intent_plus: ^5.0.0
  url_launcher: ^6.3.0

  # Notifications
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.4

  # Animations
  flutter_animate: ^4.5.0

  # Fonts & icons
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # Date/time formatting
  intl: ^0.20.1

  # Permission handling
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
